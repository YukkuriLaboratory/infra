apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - secrets.sops.yaml
  - service.yaml
  - network-policy.yaml
  - statefulset.yaml
  - serviceaccount.yaml
  - rbac.yaml
  # - ingress.yaml    # オプション

configMapGenerator:
  - name: hermes-yukulab-config
    files:
      - config.yaml=config.yaml
  - name: hermes-config-ops-skill
    files:
      - SKILL.md=skills/config-ops/SKILL.md
